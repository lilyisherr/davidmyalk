<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | DAVID MYALIK - Sideways Always</title>
    <meta name="description" content="Reset your David Myalik account password. Get back into your account and continue shopping drift culture merch.">
    <meta name="theme-color" content="#050810">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Reset Password | DAVID MYALIK">
    <meta property="og:description" content="Reset your password. Drift culture apparel for those who live life sideways.">
    <meta property="og:image" content="/images/og-image.png">
    <meta property="og:site_name" content="David Myalik - Sideways Always">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Reset Password | DAVID MYALIK">
    <meta name="twitter:description" content="Reset your password. Drift culture apparel for those who live life sideways.">
    <meta name="twitter:image" content="/images/og-image.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .auth-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(255,0,0,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,240,255,0.03) 0%, transparent 50%),
                        var(--navy);
        }
    </style>
</head>
<body>
    <div class="auth-bg"></div>
    <div id="site-nav"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div style="text-align:center; margin-bottom: 40px;">
                <a href="/" class="nav-brand" style="font-size:32px;">DAVID <span>MYALIK</span></a>
                <p class="font-mono text-muted" style="margin-top:12px; font-size:11px; letter-spacing:0.15em;">RESET YOUR PASSWORD</p>
            </div>

            <div id="error-msg" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); padding:12px 16px; margin-bottom:24px; font-family:var(--font-mono); font-size:12px; color:#ef4444;"></div>

            <div id="request-section">
                <p class="font-mono text-muted text-sm" style="margin-bottom:24px; line-height:1.6;">Enter your email and we'll generate a reset token for you.</p>
                <form id="forgot-form">
                    <div style="margin-bottom:24px;">
                        <label class="input-label">EMAIL</label>
                        <input type="email" class="input-field" id="email" required placeholder="you@example.com" autocomplete="email">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="submit-btn">SEND RESET TOKEN</button>
                </form>
            </div>

            <div id="token-section" style="display:none;">
                <div style="background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); padding:16px; margin-bottom:24px;">
                    <p class="font-mono text-xs" style="color:#22c55e; margin-bottom:8px;">RESET TOKEN GENERATED</p>
                    <p id="reset-token" class="font-mono text-xs" style="color:white; word-break:break-all; background:rgba(0,0,0,0.3); padding:8px; margin-top:8px;"></p>
                </div>
                <form id="reset-form">
                    <div style="margin-bottom:20px;">
                        <label class="input-label">RESET TOKEN</label>
                        <input type="text" class="input-field" id="token" required placeholder="Paste your token">
                    </div>
                    <div style="margin-bottom:20px;">
                        <label class="input-label">NEW PASSWORD</label>
                        <input type="password" class="input-field" id="newPassword" required placeholder="Min. 6 characters" minlength="6" autocomplete="new-password">
                    </div>
                    <div style="margin-bottom:24px;">
                        <label class="input-label">CONFIRM NEW PASSWORD</label>
                        <input type="password" class="input-field" id="confirmPassword" required placeholder="Re-enter new password" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="reset-btn">RESET PASSWORD</button>
                </form>
            </div>

            <div id="success-section" style="display:none; text-align:center;">
                <div style="width:64px; height:64px; background:rgba(34,197,94,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h3 style="font-size:24px; margin-bottom:12px;">PASSWORD <span class="text-red">RESET</span></h3>
                <p class="font-mono text-muted text-xs" style="margin-bottom:24px;">Your password has been successfully updated.</p>
                <a href="/login" class="btn btn-primary">GO TO LOGIN</a>
            </div>

            <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--border); text-align:center;">
                <p class="font-mono text-xs text-muted">Remember your password?
                    <a href="/login" style="color:var(--primary); font-weight:bold;">SIGN IN</a>
                </p>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="/js/components.js"></script>
    <script>
        (async () => {
            const user = await checkAuth();
            renderNav(user);
            renderFooter();
        })();

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
                const data = await res.json();
                if (data.token) {
                    document.getElementById('reset-token').textContent = data.token;
                    document.getElementById('token').value = data.token;
                }
                document.getElementById('request-section').style.display = 'none';
                document.getElementById('token-section').style.display = 'block';
            } catch (err) {
                errEl.textContent = 'Something went wrong.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'SEND RESET TOKEN';
            }
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-btn');
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (newPassword !== confirmPassword) {
                errEl.textContent = 'Passwords do not match';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: document.getElementById('token').value,
                        password: newPassword
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'RESET PASSWORD';
                    return;
                }
                document.getElementById('token-section').style.display = 'none';
                document.getElementById('success-section').style.display = 'block';
            } catch (err) {
                errEl.textContent = 'Something went wrong.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'RESET PASSWORD';
            }
        });
    </script>
</body>
</html>
