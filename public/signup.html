<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DAVID MYALIK - Sideways Always</title>
    <meta name="description" content="Create your David Myalik account. Join the drift culture community and shop exclusive Sideways Always merch and apparel.">
    <meta name="theme-color" content="#050810">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sign Up | DAVID MYALIK">
    <meta property="og:description" content="Join the drift culture community. Exclusive Sideways Always merch and apparel.">
    <meta property="og:image" content="/images/og-image.png">
    <meta property="og:site_name" content="David Myalik - Sideways Always">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sign Up | DAVID MYALIK">
    <meta name="twitter:description" content="Join the drift culture community. Exclusive Sideways Always merch and apparel.">
    <meta name="twitter:image" content="/images/og-image.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .auth-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(ellipse at 20% 50%, rgba(255,0,0,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,240,255,0.03) 0%, transparent 50%),
                        var(--navy);
        }
    </style>
</head>
<body>
    <div class="auth-bg"></div>
    <div id="site-nav"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div style="text-align:center; margin-bottom: 40px;">
                <a href="/" class="nav-brand" style="font-size:32px;">DAVID <span>MYALIK</span></a>
                <p class="font-mono text-muted" style="margin-top:12px; font-size:11px; letter-spacing:0.15em;">CREATE YOUR ACCOUNT</p>
            </div>

            <div id="error-msg" style="display:none; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); padding:12px 16px; margin-bottom:24px; font-family:var(--font-mono); font-size:12px; color:#ef4444;"></div>
            <div id="success-msg" style="display:none; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); padding:12px 16px; margin-bottom:24px; font-family:var(--font-mono); font-size:12px; color:#22c55e;"></div>

            <form id="signup-form">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                    <div>
                        <label class="input-label">FIRST NAME</label>
                        <input type="text" class="input-field" id="firstName" required placeholder="John" autocomplete="given-name">
                    </div>
                    <div>
                        <label class="input-label">LAST NAME</label>
                        <input type="text" class="input-field" id="lastName" required placeholder="Doe" autocomplete="family-name">
                    </div>
                </div>
                <div style="margin-bottom:20px;">
                    <label class="input-label">EMAIL</label>
                    <input type="email" class="input-field" id="email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div style="margin-bottom:20px;">
                    <label class="input-label">PASSWORD</label>
                    <input type="password" class="input-field" id="password" required placeholder="Min. 6 characters" minlength="6" autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
                    <div id="pw-strength" style="margin-top:8px;display:none;">
                        <div style="display:flex;gap:4px;margin-bottom:4px;">
                            <div id="pw-bar-1" style="flex:1;height:3px;background:rgba(255,255,255,0.1);transition:background 0.3s;"></div>
                            <div id="pw-bar-2" style="flex:1;height:3px;background:rgba(255,255,255,0.1);transition:background 0.3s;"></div>
                            <div id="pw-bar-3" style="flex:1;height:3px;background:rgba(255,255,255,0.1);transition:background 0.3s;"></div>
                            <div id="pw-bar-4" style="flex:1;height:3px;background:rgba(255,255,255,0.1);transition:background 0.3s;"></div>
                        </div>
                        <span id="pw-label" style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;"></span>
                    </div>
                </div>
                <div style="margin-bottom:24px;">
                    <label class="input-label">CONFIRM PASSWORD</label>
                    <input type="password" class="input-field" id="confirmPassword" required placeholder="Re-enter your password" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="submit-btn">CREATE ACCOUNT</button>
            </form>

            <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--border); text-align:center;">
                <p class="font-mono text-xs text-muted">Already have an account?
                    <a href="/login" style="color:var(--primary); font-weight:bold;">SIGN IN</a>
                </p>
            </div>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="/js/components.js"></script>
    <script>
        (async () => {
            const user = await checkAuth();
            renderNav(user);
            renderFooter();
        })();

        function checkPasswordStrength(pw) {
            const container = document.getElementById('pw-strength');
            if (!pw) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            let score = 0;
            if (pw.length >= 6) score++;
            if (pw.length >= 10) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            score = Math.min(score, 4);
            const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
            const labels = ['WEAK', 'FAIR', 'GOOD', 'STRONG'];
            const level = Math.max(score - 1, 0);
            for (let i = 1; i <= 4; i++) {
                document.getElementById('pw-bar-' + i).style.background = i <= score ? colors[level] : 'rgba(255,255,255,0.1)';
            }
            const label = document.getElementById('pw-label');
            label.textContent = labels[level];
            label.style.color = colors[level];
        }

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error-msg');
            const successEl = document.getElementById('success-msg');
            errEl.style.display = 'none';
            successEl.style.display = 'none';

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                errEl.textContent = 'Passwords do not match';
                errEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>';

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password,
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errEl.textContent = data.error;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'CREATE ACCOUNT';
                    return;
                }
                if (data.user.role === 'owner') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (err) {
                errEl.textContent = 'Something went wrong. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'CREATE ACCOUNT';
            }
        });
    </script>
</body>
</html>
